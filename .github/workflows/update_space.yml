- name: Sync to Hugging Face
  env:
    HF_TOKEN: ${{ secrets.HF_TOKEN }}
  run: |
    git config --global user.email "actions@github.com"
    git config --global user.name "github-actions"

    git clone https://user:$HF_TOKEN@huggingface.co/spaces/jonasjtorres/knowledge-agent space

    rsync -av --delete \
      --exclude ".git" \
      --exclude ".github" \
      --exclude ".venv" \
      --exclude "__pycache__" \
      --exclude ".ipynb_checkpoints" \
      ./ space/ || [[ $? == 24 ]]