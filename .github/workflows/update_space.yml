name: Deploy to Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare clean deploy folder
        run: |
          mkdir deploy

          rsync -av \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".venv" \
            --exclude ".venv/**" \
            --exclude "__pycache__" \
            --exclude ".ipynb_checkpoints" \
            --exclude "*.pyc" \
            --exclude "*.ipynb" \
            --exclude "deploy" \
            ./ deploy/

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy

          git init
          git config user.email "actions@github.com"
          git config user.name "github-actions"

          git remote add origin https://user:$HF_TOKEN@huggingface.co/spaces/jonasjtorres/knowledge-agent

          git add .
          git commit -m "🚀 Auto-deploy from GitHub" || echo "No changes"

          # Force push to completely avoid history issues
          git branch -M main
          git push -f origin main